<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HaNeul Albania - Distributor Zyrtar i Produkteve Koreane</title>
    <meta name="description" content="HaNeul Albania - Distributori zyrtar i produkteve premium koreane Nongshim në Shqipëri. Shin Ramyun, Shrimp Crackers dhe më shumë." />

    <!-- Critical CSS inlined -->
    <style>
      :root{--color-crimson:#E21F26;--color-navy:#1A2B56;--color-ivory:#F8F9FA;--font-sans:'Montserrat',sans-serif;--font-serif:'Playfair Display',serif}body,html{margin:0;padding:0;background-color:var(--color-ivory);color:var(--color-navy);font-family:var(--font-sans);overflow-x:hidden}*{box-sizing:border-box}
      /* Hero shell — visible before React hydrates, prevents layout shift */
      #hero-shell{position:absolute;inset:0;width:100%;height:100%;z-index:0;overflow:hidden}
      #hero-shell img{width:100%;height:100%;object-fit:cover;display:block}
      #root{min-height:100vh}
    </style>

    <!-- Google Fonts: non-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&display=swap" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&display=swap" /></noscript>

    <!-- Preload LCP image -->
    <link rel="preload" href="/hero.webp" as="image" type="image/webp" fetchpriority="high" />
    <link rel="preload" href="/HaNeul_logo_sm.webp" as="image" type="image/webp" fetchpriority="low" />

    <meta name="theme-color" content="#1a2b4b" />
    <link rel="icon" type="image/png" href="/HaNeul_logo_sm.webp" />
  </head>
  <body>
    <!-- Hero image rendered immediately in HTML — visible before React hydrates.
         React will take over this element once it mounts. -->
    <div id="hero-shell" aria-hidden="true">
      <picture>
        <source srcset="/hero.webp" type="image/webp" />
        <img src="/hero.png" alt="" width="560" height="315" fetchpriority="high" decoding="sync" />
      </picture>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
